<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery | Film Prompt Studio</title>
  <meta name="description" content="필름 프롬프트 프리셋으로 구성한 예시 갤러리와 재사용 가능한 프롬프트 모음입니다." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <meta property="og:image" content="assets/og-image.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page" data-page="gallery">
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Film Prompt Studio home">
        <span class="brand-mark">FPS</span>
        <span class="brand-text"><small>AI Image Prompt Builder</small><span>Film Prompt Studio</span></span>
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="builder.html">Builder</a>
        <a href="presets.html">Presets</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="workspace.html">Workspace</a>
      </nav>
      <div class="nav-cta">
        <a class="btn small primary" href="presets.html">Preset Library</a>
      </div>
    </div>
  </header>

  <main class="gallery-legacy-page">
    <section class="builder-header page-standard-hero">
      <div class="container">
        <span class="eyebrow"><span class="dot"></span> Prompt Gallery</span>
        <h1>결과 감성을 보고<br>조합을 선택하십시오</h1>
        <p>갤러리는 프리셋이 어떤 이미지 분위기로 이어지는지 보여주는 쇼케이스입니다. 마음에 드는 예시를 고르면 같은 조합을 Builder로 불러와 피사체와 장면을 바꿀 수 있습니다.</p>
      </div>
    </section>

    <section class="container legacy-page-body">
      <div class="filters legacy-filters gallery-filter-row">
        <input id="gallerySearch" class="input" placeholder="검색: cafe, rain, portrait..." />
        <select id="galleryMood" class="select"></select>
        <a class="btn primary" href="builder.html">새로 만들기</a>
        <strong id="galleryCount" class="eyebrow count-pill count-inline">0 examples</strong>
      </div>
      <div id="galleryList" class="grid-3 legacy-gallery-grid"></div>
    </section>
  </main>

  <div class="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
