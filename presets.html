  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <meta property="og:image" content="assets/og-image.svg" />

<body class="page" data-page="presets">
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Film Prompt Studio home">

        <span class="brand-text"><small>AI Image Prompt Builder</small><span>Film Prompt Studio</span></span>
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="builder.html">Builder</a>

        <a href="gallery.html">Gallery</a>

      </nav>
      <div class="nav-cta">
        <a class="btn small primary" href="builder.html">Start Building</a>

          <span class="eyebrow"><span class="dot"></span> Preset Library</span>
          <h1 class="legacy-page-title">30개 필름 프리셋</h1>

        </div>
        <strong id="presetCount" class="eyebrow count-pill">0 presets</strong>

      <div class="filters legacy-filters">
        <input id="presetSearch" class="input" placeholder="검색: rain, product, cafe..." />
        <select id="filterMood" class="select"></select>
        <select id="filterFilm" class="select"></select>
      </div>
      <div class="split-page">
        <div id="presetList" class="preset-list"></div>
        <aside class="panel detail-panel" id="presetDetail"></aside>
      </div>
    </div>
  </main>

  <div class="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
