<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presets | Film Prompt Studio</title>
  <meta name="description" content="필름 무드, 렌즈, 구도, 조명 조합으로 구성된 AI 이미지 프롬프트 프리셋 라이브러리입니다." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <meta property="og:image" content="assets/og-image.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page" data-page="presets">
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Film Prompt Studio home">
        <span class="brand-mark">FPS</span>
        <span class="brand-text"><small>AI Image Prompt Builder</small><span>Film Prompt Studio</span></span>
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="builder.html">Builder</a>
        <a class="active" href="presets.html">Presets</a>
        <a href="gallery.html">Gallery</a>
        <a href="workspace.html">Workspace</a>
      </nav>
      <div class="nav-cta">
        <a class="btn small primary" href="builder.html">Start Building</a>
      </div>
    </div>
  </header>

  <main class="preset-legacy-page">
    <section class="builder-header page-standard-hero">
      <div class="container">
        <span class="eyebrow"><span class="dot"></span> Preset Library</span>
        <h1>검증된 조합으로<br>빠르게 시작하십시오</h1>
        <p>프리셋은 완성 이미지가 아니라 Builder에 불러오는 촬영 레시피입니다. 무드, 필름, 렌즈, 구도, 빛이 미리 맞춰져 있으니 피사체와 장면만 바꿔 새로운 프롬프트로 확장하십시오.</p>
      </div>
    </section>

    <section class="container legacy-page-body">
      <div class="filters legacy-filters preset-filter-row">
        <input id="presetSearch" class="input" placeholder="검색: rain, product, cafe..." />
        <select id="filterMood" class="select"></select>
        <select id="filterFilm" class="select"></select>
        <strong id="presetCount" class="eyebrow count-pill count-inline">0 presets</strong>
      </div>
      <div class="split-page">
        <div id="presetList" class="preset-list"></div>
        <aside class="panel detail-panel" id="presetDetail"></aside>
      </div>
    </section>
  </main>

  <div class="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
